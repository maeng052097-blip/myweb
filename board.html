<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자유게시판 | Agentic Architect 맹세영</title>
    <meta name="description" content="맹세영 포트폴리오 자유게시판 — 방문자 소통 공간">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ========================================
           BOARD PAGE — DARK PREMIUM THEME
           ======================================== */
        body {
            background: #0a0f1e;
        }

        .board-page {
            padding-top: 100px;
            min-height: 100vh;
            position: relative;
            padding-bottom: 60px;
        }

        /* Particle canvas for board */
        #board-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Interactive mouse glow */
        .interactive-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background: radial-gradient(
                850px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(34, 211, 238, 0.06),
                transparent 80%
            ), radial-gradient(
                250px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(7, 76, 145, 0.12),
                transparent 60%
            );
            pointer-events: none;
            transition: background 0.1s ease-out;
        }

        /* ===== BOARD HEADER ===== */
        .board-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .board-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f8fafc 0%, #60a5fa 50%, #22d3ee 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .board-header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        /* ===== TOOLBAR ===== */
        .board-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 16px 24px;
            background: rgba(22, 30, 49, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            border: 1px solid rgba(34, 211, 238, 0.08);
            position: relative;
            z-index: 1;
        }

        .toolbar-status {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .toolbar-status span {
            color: #22d3ee;
            font-weight: 700;
        }

        .write-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #074c91, #1565c0);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .write-btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transform: translate(-50%,-50%);
            transition: width 0.5s, height 0.5s;
        }

        .write-btn:hover {
            background: linear-gradient(135deg, #1565c0, #22d3ee);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.2);
        }

        .write-btn:active::after {
            width: 250px; height: 250px;
        }

        /* ===== POST CARDS ===== */
        .board-list {
            display: grid;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .post-wrapper {
            animation: postSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes postSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-card {
            background: rgba(22, 30, 49, 0.6);
            backdrop-filter: blur(12px);
            padding: 25px 28px;
            border-radius: 16px;
            border: 1px solid rgba(30, 41, 59, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.03), transparent);
            transition: left 0.7s ease;
        }

        .post-card:hover {
            border-color: rgba(34, 211, 238, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 20px rgba(34, 211, 238, 0.03);
            transform: translateY(-3px);
        }

        .post-card:hover::before {
            left: 150%;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(34, 211, 238, 0.06);
            padding-bottom: 12px;
        }

        .post-author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .author-details {
            display: flex;
            flex-direction: column;
        }

        .post-author {
            font-weight: 700;
            color: #f8fafc;
            font-size: 0.95rem;
        }

        .post-date {
            font-size: 0.8rem;
            color: #64748b;
        }

        .post-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 8px;
        }

        .badge-owner {
            background: rgba(34, 211, 238, 0.1);
            color: #22d3ee;
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .post-content {
            color: #e2e8f0;
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        /* Content Toggle */
        .content-wrapper {
            position: relative;
            margin-bottom: 12px;
        }

        .content-body {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .content-body.collapsed {
            max-height: 100px;
            mask-image: linear-gradient(to bottom, white 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, white 50%, transparent 100%);
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #22d3ee;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0;
            margin-top: 8px;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: #60a5fa;
        }

        /* Post Actions */
        .post-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(30, 41, 59, 0.6);
        }

        .like-btn {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(30, 41, 59, 0.8);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .like-btn:hover {
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            transform: scale(1.05);
        }

        .like-btn:active {
            transform: scale(0.95);
        }

        .like-btn.liked {
            background: rgba(244, 67, 54, 0.15);
            border-color: #f44336;
            color: #f44336;
        }

        .like-count {
            font-weight: 700;
        }

        .reply-btn {
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 0;
            transition: color 0.2s;
        }

        .reply-btn:hover { color: #22d3ee; }

        .action-btn {
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            font-weight: 500;
        }

        .edit-btn {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            border-color: rgba(96, 165, 250, 0.2);
        }
        .edit-btn:hover {
            background: rgba(96, 165, 250, 0.2);
        }

        .delete-btn {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border-color: rgba(244, 67, 54, 0.2);
        }
        .delete-btn:hover {
            background: rgba(244, 67, 54, 0.2);
        }

        /* ===== REPLIES ===== */
        .reply-container {
            margin-left: 40px;
            margin-top: -10px;
            margin-bottom: 20px;
            border-left: 2px solid rgba(34, 211, 238, 0.15);
            padding-left: 20px;
        }

        .reply-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(30, 41, 59, 0.6);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .reply-card:hover {
            border-color: rgba(34, 211, 238, 0.12);
        }

        /* ===== MODAL ===== */
        .board-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #161e31, #0f172a);
            width: 90%;
            max-width: 560px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(34, 211, 238, 0.1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(34, 211, 238, 0.03);
            animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-content h3 {
            margin-bottom: 24px;
            color: #22d3ee;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-content label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .modal-content input[type="text"],
        .modal-content input[type="password"],
        .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(30, 41, 59, 0.8);
            border-radius: 10px;
            background: rgba(10, 15, 30, 0.8);
            color: #f8fafc;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .modal-content input:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: rgba(34, 211, 238, 0.4);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.08);
        }

        .modal-content textarea {
            resize: none;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .password-hint {
            font-size: 0.78rem;
            color: #64748b;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-cancel {
            background: rgba(30, 41, 59, 0.8);
            color: #94a3b8;
        }

        .modal-btn-cancel:hover {
            background: rgba(30, 41, 59, 1);
            color: #cbd5e1;
        }

        .modal-btn-submit {
            background: linear-gradient(135deg, #074c91, #1565c0);
            color: white;
        }

        .modal-btn-submit:hover {
            background: linear-gradient(135deg, #1565c0, #22d3ee);
            box-shadow: 0 6px 16px rgba(34, 211, 238, 0.2);
            transform: translateY(-1px);
        }

        /* ===== PASSWORD VERIFY MODAL ===== */
        .verify-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .verify-content {
            background: linear-gradient(135deg, #161e31, #0f172a);
            width: 90%;
            max-width: 400px;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(34, 211, 238, 0.1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            text-align: center;
            animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .verify-content h3 {
            color: #f8fafc;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .verify-content p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .verify-content input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(30, 41, 59, 0.8);
            border-radius: 10px;
            background: rgba(10, 15, 30, 0.8);
            color: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .verify-content input:focus {
            outline: none;
            border-color: rgba(34, 211, 238, 0.4);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.08);
        }

        .verify-error {
            color: #f44336;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: none;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ===== NO POSTS ===== */
        .no-posts-message {
            text-align: center;
            padding: 80px 20px;
            color: #475569;
            position: relative;
            z-index: 1;
        }

        .no-posts-message .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            display: block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .no-posts-message p {
            font-size: 1.1rem;
            color: #64748b;
        }

        .no-posts-message small {
            color: #475569;
            font-size: 0.85rem;
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            background: rgba(22, 30, 49, 0.95);
            backdrop-filter: blur(12px);
            color: #f8fafc;
            border-radius: 12px;
            border: 1px solid rgba(34, 211, 238, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 5000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-color: rgba(76, 175, 80, 0.3); }
        .toast.error { border-color: rgba(244, 67, 54, 0.3); }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: #22d3ee;
            border-color: rgba(34, 211, 238, 0.4);
            background: rgba(34, 211, 238, 0.05);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .board-header h1 { font-size: 2rem; }
            .board-toolbar { flex-direction: column; gap: 12px; }
            .reply-container { margin-left: 20px; padding-left: 12px; }
            .form-row { flex-direction: column; gap: 0; }
            .post-card { padding: 18px 20px; }
        }
    </style>
</head>
<body>
    <canvas id="board-particles"></canvas>
    <div class="interactive-bg"></div>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html#home" class="nav-logo">MSY PORTFOLIO</a>
            <ul class="nav-links">
                <li><a href="index.html" class="back-btn">← 포트폴리오로 돌아가기</a></li>
            </ul>
        </div>
    </nav>

    <main class="board-page">
        <div class="container">
            <div class="board-header">
                <h1>💬 자유게시판</h1>
                <p>방문해주셔서 감사합니다. 자유롭게 기록을 남겨주세요!</p>
            </div>
            
            <div class="board-toolbar">
                <div class="toolbar-status">전체 글 <span id="post-count">0</span>개</div>
                <button class="write-btn" onclick="openWriteModal()">✏️ 새 글 쓰기</button>
            </div>

            <div id="no-posts" class="no-posts-message" style="display: none;">
                <span class="empty-icon">📭</span>
                <p>등록된 게시글이 없습니다.</p>
                <small>첫 번째 글을 남겨보세요!</small>
            </div>

            <div id="post-list" class="board-list">
                <!-- Posts injected here -->
            </div>
        </div>
    </main>

    <!-- Write/Edit Modal -->
    <div id="board-modal" class="board-modal">
        <div class="modal-content">
            <h3 id="modal-title">✏️ 글 남기기</h3>
            <form id="post-form">
                <input type="hidden" id="post-id">
                <input type="hidden" id="parent-id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="post-author-input">작성자</label>
                        <input type="text" id="post-author-input" required placeholder="이름을 입력하세요" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label for="post-password-input">비밀번호</label>
                        <input type="password" id="post-password-input" required placeholder="수정/삭제 시 필요" maxlength="20">
                        <div class="password-hint">🔒 본인 글 수정/삭제 시 필요합니다</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="post-content-input">내용</label>
                    <textarea id="post-content-input" rows="6" required placeholder="자유롭게 기록을 남겨주세요"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn modal-btn-cancel" onclick="closeModal()">취소</button>
                    <button type="submit" class="modal-btn modal-btn-submit">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Password Verify Modal -->
    <div id="verify-modal" class="verify-modal">
        <div class="verify-content">
            <h3>🔐 비밀번호 확인</h3>
            <p>글 작성 시 설정한 비밀번호를 입력해주세요</p>
            <input type="password" id="verify-password" placeholder="비밀번호" maxlength="20">
            <div id="verify-error" class="verify-error">비밀번호가 일치하지 않습니다</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeVerifyModal()">취소</button>
                <button class="modal-btn modal-btn-submit" onclick="confirmVerify()">확인</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="board.js"></script>
</body>
</html>
